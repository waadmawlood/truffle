name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: 7.4
            laravel: 8.*
          - php: 8.1
            laravel: 10.*
          - php: 8.3
            laravel: 12.*
          - php: 8.4
            laravel: 13.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, json
          coverage: none

      - name: Install dependencies
        run: |
          composer update

      - name: Execute tests
        run: vendor/bin/phpunit --testdox
